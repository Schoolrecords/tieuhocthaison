<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>OG Banner — TH Thái Sơn (1200×630)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Be Vietnam Pro', 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 45%, #a7f3d0 100%);
    position: relative;
    color: #14532d;
  }
  /* Decorative circles */
  .deco { position: absolute; border-radius: 50%; opacity: .35; pointer-events: none; }
  .deco1 { width: 280px; height: 280px; background: #86efac; top: -90px; left: -90px; }
  .deco2 { width: 220px; height: 220px; background: #fde68a; bottom: -70px; right: -70px; opacity: .55; }
  .deco3 { width: 110px; height: 110px; background: #5eead4; top: 60px; right: 80px; opacity: .55; }
  .deco4 { width: 80px; height: 80px; background: #fdba74; bottom: 120px; left: 100px; opacity: .55; }

  /* Frame */
  .frame {
    position: absolute;
    inset: 30px;
    border: 4px solid rgba(22, 163, 74, .25);
    border-radius: 28px;
    background: rgba(255, 255, 255, .25);
    backdrop-filter: blur(2px);
  }

  .wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 56px;
    padding: 0 60px;
  }

  .logo-box {
    width: 460px;
    height: 460px;
    background: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 60px rgba(20, 83, 45, .25), 0 0 0 8px rgba(255,255,255,.6);
    flex-shrink: 0;
  }
  .logo-box img {
    width: 92%;
    height: 92%;
    object-fit: contain;
    border-radius: 50%;
  }

  .text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 540px;
  }
  .kicker {
    display: inline-block;
    background: #16a34a;
    color: #fff;
    padding: 6px 16px;
    border-radius: 99px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: .5px;
    width: fit-content;
    box-shadow: 0 4px 10px rgba(22,163,74,.3);
  }
  h1 {
    font-size: 50px;
    font-weight: 800;
    line-height: 1.1;
    color: #14532d;
    letter-spacing: -.5px;
  }
  h1 .green { color: #16a34a; }
  .sub {
    font-size: 22px;
    font-weight: 500;
    color: #166534;
    line-height: 1.4;
    margin-top: 4px;
  }
  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .chip {
    background: rgba(255,255,255,.85);
    border: 1.5px solid #86efac;
    color: #14532d;
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 15px;
    font-weight: 600;
  }
  .footer {
    position: absolute;
    bottom: 22px;
    left: 60px;
    right: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    color: #166534;
    font-style: italic;
    z-index: 3;
  }
  .footer b { color: #14532d; font-style: normal; }
</style>
</head>
<body>
  <div class="deco deco1"></div>
  <div class="deco deco2"></div>
  <div class="deco deco3"></div>
  <div class="deco deco4"></div>
  <div class="frame"></div>

  <div class="wrap">
    <div class="logo-box">
      <img src="Logo_THTS.png" alt="Logo Trường Tiểu học Thái Sơn">
    </div>
    <div class="text">
      <span class="kicker">🏫 TRƯỜNG TIỂU HỌC THÁI SƠN</span>
      <h1>Hệ thống <span class="green">Hồ sơ số</span> toàn diện</h1>
      <p class="sub">Quản lý nhà trường · Học bạ số · Kiểm định chất lượng — theo Thông tư 27/2020/TT-BGDĐT</p>
      <div class="features">
        <span class="chip">📋 Hồ sơ số</span>
        <span class="chip">📊 QLCL</span>
        <span class="chip">🏅 KĐCL</span>
        <span class="chip">🛡 ĐBCL</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <span>Xã Văn Hiến, Tỉnh Nghệ An</span>
    <span><b>schoolrecords.github.io/tieuhocthaison</b></span>
  </div>
</body>
</html>
