  <line x1="513" y1="368" x2="540" y2="368" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="552" cy="368" r="10" fill="#e2e8f0"/>
  <text x="552" y="373" font-size="11" fill="#64748b" text-anchor="middle" font-weight="700">2</text>
