  <!-- Detailed mockup of step 1 modal -->
  <rect x="50" y="330" width="800" height="210" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="50" y="330" width="800" height="50" rx="12" fill="linear-gradient(135deg,#eff6ff,#f0fdf4)"/>
