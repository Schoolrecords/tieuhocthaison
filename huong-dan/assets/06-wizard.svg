  <text x="70" y="406" font-size="13" font-weight="700" fill="#0f172a">Bước 1/4 — Thông tin trường</text>

  <text x="70" y="430" font-size="11" font-weight="600" fill="#0f172a">Tên trường (đầy đủ) *</text>
  <rect x="70" y="436" width="350" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1"/>
