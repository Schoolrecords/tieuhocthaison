<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="Segoe UI, Be Vietnam Pro, sans-serif">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e3a8a"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="url(#bgG)"/>

  <text x="450" y="36" font-size="22" font-weight="700" fill="#1e3a8a" text-anchor="middle">KIẾN TRÚC MULTI-SCHOOL (PHƯƠNG ÁN D)</text>
  <text x="450" y="60" font-size="13" fill="#64748b" text-anchor="middle">1 GitHub Pages chung + Registry public + N Apps Script riêng (data isolated)</text>

  <!-- GitHub Pages block -->
  <rect x="200" y="90" width="500" height="120" rx="12" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
  <text x="450" y="115" font-size="15" font-weight="700" fill="#1e3a8a" text-anchor="middle">📦 GitHub Pages: hsstieuhoc (1 repo duy nhất)</text>
  <text x="220" y="140" font-size="12" fill="#0f172a">• index.html · app.js · qlcl.html · qlcl-app.js</text>
  <text x="220" y="160" font-size="12" fill="#0f172a">• boot.js (Router FE) · wizard.js (First-run wizard)</text>
  <text x="220" y="180" font-size="12" fill="#0f172a">• <tspan font-weight="700" fill="#0d9488">schools.json</tspan> ← Registry public, mỗi trường 1 entry</text>
  <text x="220" y="200" font-size="11" fill="#64748b">URL: schoolrecords.github.io/hsstieuhoc/?school=&lt;code&gt;</text>

  <!-- Arrows down -->
  <line x1="280" y1="220" x2="180" y2="280" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="450" y1="220" x2="450" y2="280" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="620" y1="220" x2="720" y2="280" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 3 schools -->
  <g>
    <rect x="50" y="290" width="240" height="200" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2"/>
    <text x="170" y="315" font-size="14" font-weight="700" fill="#0d9488" text-anchor="middle">🏫 TH Diễn Liên</text>
    <text x="170" y="334" font-size="11" fill="#64748b" text-anchor="middle">?school=dienlien</text>
    <line x1="70" y1="348" x2="270" y2="348" stroke="#e2e8f0"/>
    <text x="65" y="370" font-size="11" fill="#0f172a">📊 Google Sheet riêng</text>
    <text x="65" y="390" font-size="11" fill="#0f172a">⚙️ Apps Script riêng</text>
    <text x="65" y="410" font-size="11" fill="#0f172a">📁 Drive folder riêng</text>
    <text x="65" y="430" font-size="11" fill="#0f172a">🔑 AUTH_TOKEN riêng</text>
    <text x="65" y="450" font-size="11" fill="#0f172a">📋 Danh mục MC riêng</text>
    <text x="65" y="478" font-size="10" font-style="italic" fill="#64748b">✓ Data isolation</text>
  </g>

  <g>
    <rect x="330" y="290" width="240" height="200" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2"/>
    <text x="450" y="315" font-size="14" font-weight="700" fill="#0d9488" text-anchor="middle">🏫 TH Thái Sơn</text>
    <text x="450" y="334" font-size="11" fill="#64748b" text-anchor="middle">?school=thaison</text>
    <line x1="350" y1="348" x2="550" y2="348" stroke="#e2e8f0"/>
    <text x="345" y="370" font-size="11" fill="#0f172a">📊 Google Sheet riêng</text>
    <text x="345" y="390" font-size="11" fill="#0f172a">⚙️ Apps Script riêng</text>
    <text x="345" y="410" font-size="11" fill="#0f172a">📁 Drive folder riêng</text>
    <text x="345" y="430" font-size="11" fill="#0f172a">🔑 AUTH_TOKEN riêng</text>
    <text x="345" y="450" font-size="11" fill="#0f172a">📋 Danh mục MC riêng</text>
    <text x="345" y="478" font-size="10" font-style="italic" fill="#64748b">✓ Data isolation</text>
  </g>

  <g>
    <rect x="610" y="290" width="240" height="200" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="730" y="315" font-size="14" font-weight="700" fill="#0d9488" text-anchor="middle">🏫 TH ...</text>
    <text x="730" y="334" font-size="11" fill="#64748b" text-anchor="middle">?school=truong3</text>
    <line x1="630" y1="348" x2="830" y2="348" stroke="#e2e8f0"/>
    <text x="625" y="378" font-size="11" fill="#64748b">Thêm trường mới =</text>
    <text x="625" y="398" font-size="11" fill="#64748b">+ 1 entry JSON</text>
    <text x="625" y="418" font-size="11" fill="#64748b">+ 1 Sheet + Apps Script</text>
    <text x="625" y="438" font-size="11" fill="#64748b">trong ~5 phút</text>
    <text x="625" y="478" font-size="10" font-style="italic" fill="#64748b">✓ Scale tới 20+ trường</text>
  </g>

  <!-- Bottom note -->
  <rect x="50" y="510" width="800" height="34" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="532" font-size="12" font-weight="600" fill="#78350f" text-anchor="middle">🎯 Mỗi trường KHÔNG xem được data trường khác. Thầy chỉ cần update FE 1 lần — tất cả trường nhận update.</text>
</svg>
