<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="Segoe UI, Be Vietnam Pro, sans-serif">
  <rect width="900" height="560" fill="#f8fafc"/>

  <text x="450" y="32" font-size="20" font-weight="700" fill="#1e3a8a" text-anchor="middle">BƯỚC 2: CÀI ĐẶT GOOGLE APPS SCRIPT</text>

  <!-- Sub steps left side -->
  <g>
    <circle cx="40" cy="80" r="14" fill="#0d9488"/>
    <text x="40" y="85" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">1</text>
    <text x="60" y="78" font-size="13" font-weight="700" fill="#0f172a">Trong Sheet: Extensions → Apps Script</text>
    <text x="60" y="95" font-size="11" fill="#64748b">Mở tab mới với Apps Script editor</text>
  </g>

  <g>
    <circle cx="40" cy="125" r="14" fill="#0d9488"/>
    <text x="40" y="130" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">2</text>
    <text x="60" y="123" font-size="13" font-weight="700" fill="#0f172a">Xóa code mặc định</text>
    <text x="60" y="140" font-size="11" fill="#64748b">Ctrl+A (chọn tất cả) → Delete (xóa hết function myFunction)</text>
  </g>

  <g>
    <circle cx="40" cy="170" r="14" fill="#0d9488"/>
    <text x="40" y="175" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">3</text>
    <text x="60" y="168" font-size="13" font-weight="700" fill="#0f172a">Mở file Code.gs trong dự án local</text>
    <text x="60" y="185" font-size="11" fill="#64748b">Path: D:\XebatcheoTrT\...\THThaiSon_DoLuong\Code.gs</text>
  </g>

  <g>
    <circle cx="40" cy="215" r="14" fill="#0d9488"/>
    <text x="40" y="220" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">4</text>
    <text x="60" y="213" font-size="13" font-weight="700" fill="#0f172a">Ctrl+A → Ctrl+C trên file Code.gs</text>
    <text x="60" y="230" font-size="11" fill="#64748b">Chọn TẤT CẢ ~5000 dòng (đừng bỏ sót dòng nào)</text>
  </g>

  <g>
    <circle cx="40" cy="260" r="14" fill="#0d9488"/>
    <text x="40" y="265" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">5</text>
    <text x="60" y="258" font-size="13" font-weight="700" fill="#0f172a">Sang Apps Script editor → Ctrl+V (Paste)</text>
    <text x="60" y="275" font-size="11" fill="#64748b">Code dán vào editor</text>
  </g>

  <g>
    <circle cx="40" cy="305" r="14" fill="#0d9488"/>
    <text x="40" y="310" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">6</text>
    <text x="60" y="303" font-size="13" font-weight="700" fill="#0f172a">Bấm 💾 Save (Ctrl+S) — đặt tên dự án</text>
    <text x="60" y="320" font-size="11" fill="#64748b">VD: "HSS_TH_ThaiSon_Backend"</text>
  </g>

  <g>
    <circle cx="40" cy="350" r="14" fill="#0d9488"/>
    <text x="40" y="355" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">7</text>
    <text x="60" y="348" font-size="13" font-weight="700" fill="#0f172a">Chọn function "setup" trong dropdown → bấm ▶ Run</text>
    <text x="60" y="365" font-size="11" fill="#64748b">Cấp quyền khi được hỏi (Authorize → Allow)</text>
  </g>

  <g>
    <circle cx="40" cy="395" r="14" fill="#0d9488"/>
    <text x="40" y="400" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">8</text>
    <text x="60" y="393" font-size="13" font-weight="700" fill="#0f172a">Đợi run xong (Logs hiển thị "Setup OK")</text>
    <text x="60" y="410" font-size="11" fill="#64748b">Quay lại Sheet F5 → các tab tự xuất hiện: CauHinh, Danh muc HSS, MinhChung, ...</text>
  </g>

  <!-- Visual: Apps Script editor mockup -->
  <rect x="490" y="60" width="380" height="290" rx="8" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="490" y="60" width="380" height="32" fill="#0f172a"/>
  <text x="510" y="80" font-size="11" fill="#cbd5e1" font-family="monospace">⟨/⟩ Apps Script — Code.gs</text>
  <circle cx="800" cy="76" r="8" fill="#fbbf24"/>
  <text x="800" y="80" font-size="10" fill="#0f172a" text-anchor="middle" font-weight="700">▶</text>
  <text x="820" y="80" font-size="10" fill="#fbbf24">Run setup</text>

  <!-- Line numbers + code -->
  <rect x="490" y="92" width="30" height="258" fill="#334155"/>
  <g font-family="Consolas, monospace" font-size="10" fill="#94a3b8">
    <text x="500" y="108" text-anchor="end">1</text>
    <text x="500" y="124" text-anchor="end">2</text>
    <text x="500" y="140" text-anchor="end">3</text>
    <text x="500" y="156" text-anchor="end">4</text>
    <text x="500" y="172" text-anchor="end">5</text>
    <text x="500" y="188" text-anchor="end">6</text>
    <text x="500" y="204" text-anchor="end">7</text>
    <text x="500" y="220" text-anchor="end">8</text>
    <text x="500" y="236" text-anchor="end">...</text>
  </g>

  <!-- Code lines -->
  <g font-family="Consolas, monospace" font-size="10">
    <text x="530" y="108" fill="#64748b">/**</text>
    <text x="530" y="124" fill="#64748b"> * BACKEND CHUNG - HỆ THỐNG HỒ SƠ SỐ</text>
    <text x="530" y="140" fill="#64748b"> * Multi-School template (Kiến trúc D)</text>
    <text x="530" y="156" fill="#64748b"> */</text>
    <text x="530" y="172" fill="#7dd3fc">const</text>
    <tspan>
      <text x="565" y="172" fill="#fde68a">_HSS_GET_ACTIONS</text>
      <text x="675" y="172" fill="#94a3b8">= [...];</text>
    </tspan>
    <text x="530" y="188" fill="#7dd3fc">function</text>
    <text x="580" y="188" fill="#fde68a">setup()</text>
    <text x="625" y="188" fill="#94a3b8">{</text>
    <text x="540" y="204" fill="#94a3b8">  // Tạo các tab cần thiết</text>
    <text x="540" y="220" fill="#94a3b8">  ...</text>
    <text x="530" y="236" fill="#94a3b8">}</text>
  </g>

  <!-- Status bar -->
  <rect x="490" y="320" width="380" height="30" fill="#0f172a"/>
  <text x="500" y="338" font-size="10" fill="#10b981" font-family="monospace">✓ Execution started • Execution log</text>

  <!-- Warning bottom -->
  <rect x="50" y="450" width="820" height="90" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="70" y="475" font-size="14" font-weight="700" fill="#78350f">⚠ Lần ĐẦU chạy setup, Google sẽ hỏi quyền:</text>
  <text x="70" y="498" font-size="12" fill="#78350f">1. "Authorization required" → Review Permissions</text>
  <text x="70" y="518" font-size="12" fill="#78350f">2. "Google hasn't verified this app" → Advanced → Go to ... (unsafe) → Allow</text>
  <text x="70" y="535" font-size="11" fill="#78350f" font-style="italic">→ Đây là an toàn vì là code của thầy tạo, KHÔNG phải app bên thứ ba.</text>
</svg>
