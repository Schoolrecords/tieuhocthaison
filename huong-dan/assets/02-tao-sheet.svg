<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="Segoe UI, Be Vietnam Pro, sans-serif">
  <rect width="900" height="560" fill="#f8fafc"/>

  <text x="450" y="34" font-size="20" font-weight="700" fill="#1e3a8a" text-anchor="middle">BƯỚC 1: TẠO GOOGLE SHEET CHO TRƯỜNG</text>

  <!-- Browser bar -->
  <rect x="50" y="60" width="800" height="40" rx="6" fill="#fff" stroke="#cbd5e1"/>
  <circle cx="70" cy="80" r="5" fill="#ef4444"/>
  <circle cx="86" cy="80" r="5" fill="#f59e0b"/>
  <circle cx="102" cy="80" r="5" fill="#10b981"/>
  <rect x="130" y="68" width="700" height="24" rx="12" fill="#f1f5f9"/>
  <text x="145" y="84" font-size="12" fill="#0f172a" font-family="monospace">🔒 https://sheets.new</text>
  <rect x="780" y="68" width="40" height="24" rx="4" fill="#1e3a8a"/>
  <text x="800" y="84" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">Enter</text>

  <!-- Step 1 -->
  <rect x="50" y="120" width="800" height="80" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2"/>
  <circle cx="80" cy="160" r="18" fill="#0d9488"/>
  <text x="80" y="166" font-size="16" fill="#fff" text-anchor="middle" font-weight="700">1</text>
  <text x="120" y="148" font-size="14" font-weight="700" fill="#0f172a">Mở trình duyệt → gõ địa chỉ: sheets.new</text>
  <text x="120" y="170" font-size="12" fill="#64748b">Đây là shortcut tạo Google Sheet mới NGAY (không cần vào Drive). Cần đăng nhập Gmail trước.</text>
  <text x="120" y="190" font-size="12" fill="#64748b" font-style="italic">→ Hệ thống mở 1 Sheet trống tên "Untitled spreadsheet"</text>

  <!-- Step 2 -->
  <rect x="50" y="220" width="800" height="80" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2"/>
  <circle cx="80" cy="260" r="18" fill="#0d9488"/>
  <text x="80" y="266" font-size="16" fill="#fff" text-anchor="middle" font-weight="700">2</text>
  <text x="120" y="248" font-size="14" font-weight="700" fill="#0f172a">Đổi tên Sheet (click vào "Untitled spreadsheet" góc trên trái)</text>
  <text x="120" y="270" font-size="12" fill="#64748b">Đặt tên có quy ước, vd: <tspan font-family="monospace" fill="#0d9488" font-weight="700">HSS_TH_ThaiSon_2026</tspan></text>
  <text x="120" y="290" font-size="12" fill="#64748b" font-style="italic">→ Thầy sẽ dễ tìm Sheet này sau qua Drive (đặt tên có "HSS_" để search nhanh)</text>

  <!-- Mockup Sheet UI -->
  <rect x="50" y="320" width="800" height="200" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Top bar of Sheet -->
  <rect x="50" y="320" width="800" height="40" fill="#fff" stroke="#cbd5e1"/>
  <rect x="70" y="332" width="200" height="20" rx="4" fill="#dcfce7" stroke="#10b981"/>
  <text x="80" y="346" font-size="12" fill="#065f46" font-weight="700">📊 HSS_TH_ThaiSon_2026</text>
  <text x="285" y="346" font-size="11" fill="#64748b">⭐</text>
  <text x="310" y="346" font-size="11" fill="#64748b">Cloud saved</text>

  <!-- Menu items -->
  <text x="70" y="380" font-size="12" fill="#0f172a">File   Edit   View   Insert   Format   Data   Tools   <tspan font-weight="700" fill="#dc2626">Extensions ▾</tspan>   Help</text>

  <!-- Mock cells -->
  <line x1="50" y1="390" x2="850" y2="390" stroke="#cbd5e1"/>
  <text x="60" y="406" font-size="11" fill="#94a3b8">  A  </text>
  <text x="160" y="406" font-size="11" fill="#94a3b8">  B  </text>
  <text x="260" y="406" font-size="11" fill="#94a3b8">  C  </text>
  <text x="360" y="406" font-size="11" fill="#94a3b8">  D  </text>
  <rect x="50" y="415" width="800" height="22" fill="#f8fafc"/>
  <text x="62" y="430" font-size="11" fill="#64748b" font-style="italic">(Sheet trống — chưa có dữ liệu, đó là điều bình thường ở bước này)</text>
  <text x="60" y="460" font-size="11" fill="#94a3b8">2</text>
  <text x="60" y="480" font-size="11" fill="#94a3b8">3</text>
  <text x="60" y="500" font-size="11" fill="#94a3b8">4</text>

  <!-- Arrow pointing to Extensions -->
  <path d="M 600 380 Q 700 365 720 354" stroke="#dc2626" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <text x="610" y="402" font-size="12" font-weight="700" fill="#dc2626">⬆ Bước kế: vào "Extensions" để mở Apps Script</text>
</svg>
